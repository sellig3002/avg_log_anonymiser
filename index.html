<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AVG Anonimiseer</title>
<style>
  body { font-family: system-ui, sans-serif; background:#0f1117; color:#e2e4ea;
         max-width:900px; margin:0 auto; padding:24px; }
  h1 { font-size:20px; }
  label { display:block; font-size:12px; text-transform:uppercase; letter-spacing:.8px;
          color:#8b90a0; margin:16px 0 6px; }
  textarea { width:100%; min-height:220px; padding:12px; background:#1a1d27;
             border:1px solid #2e3345; border-radius:8px; color:#e2e4ea;
             font-family:monospace; font-size:13px; resize:vertical; }
  button { margin-top:12px; padding:9px 20px; border:none; border-radius:8px;
           background:#4f8cff; color:#fff; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  #status { margin-left:12px; font-size:13px; color:#8b90a0; }
</style>
</head>
<body>
  <h1>AVG Anonimiseer</h1>
  <label>Invoer (JSON)</label>
  <textarea id="input" placeholder="Plak hier je JSON-log..." spellcheck="false"></textarea>
  <div>
    <button id="go" onclick="run()">Anonimiseer</button>
    <span id="status"></span>
  </div>
  <label>Uitvoer</label>
  <textarea id="output" spellcheck="false"></textarea>
<script>
async function run() {
  const btn = document.getElementById('go');
  const status = document.getElementById('status');
  const input = document.getElementById('input').value;
  btn.disabled = true; status.textContent = 'Bezig...';
  try {
    const res = await fetch('/anonymize', { method:'POST', body: input });
    document.getElementById('output').value = await res.text();
    status.textContent = res.ok ? 'Klaar' : 'Fout';
  } catch (e) {
    status.textContent = 'Fout: ' + e;
  }
  btn.disabled = false;
}
</script>
</body>
</html>
