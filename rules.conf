# rules.conf
# Bepaalt hoe elk key/value-paar uit de log wordt ingedeeld.
# - Matching is hoofdletter-ongevoelig.
# - Lege regels en regels die met # beginnen worden genegeerd.
# - Elk kopje staat tussen [ ] , daaronder één woord per regel.
#
# Logica per paar:
#   1. anonymize.valueContains  -> woord in de VALUE -> ALTIJD anonymize (harde override, key maakt niet uit)
#   2. daarna kijken we of de KEY onder de anonymize-regels en/of de skip-regels valt:
#        - alleen anonymize (keyEquals/keyContains) -> anonymize
#        - alleen skip (keyEquals/keyContains)      -> weggooien
#        - allebei (botsing) of geen van beide      -> twijfel -> llm
#
# Alles is een voorbeeld: pas de lijsten aan naar jouw situatie.


# 1) Woorden die, als ze in een VALUE staan, het paar ALTIJD laten anonimiseren.
#    Dit is de allereerste check, ongeacht de key. Zet hier bv. klantnamen neer.
[anonymize.valueContains]
vrbzo

# 2) Exacte keys die ALTIJD persoonsgegevens zijn.
[anonymize.keyEquals]
callerIpAddress
ipAddress
userPrincipalName

# 3) Keys die één van deze woorden bevatten worden ALTIJD geanonimiseerd.
[anonymize.keyContains]
email
phone
username

# 4) Exacte keys die NOOIT onder de AVG vallen (weggooien).
[skip.keyEquals]
serverName
level
category
resultSignature
operationName
location
0
1
conditionsNotSatisfied
userAgent
browser
result
networkType
key
displayName

# 5) Keys die één van deze woorden bevatten vallen NOOIT onder de AVG (weggooien).
[skip.keyContains]
time
type
version
duration
status
method
scope
country
longitude
latitude
state
city
agent
